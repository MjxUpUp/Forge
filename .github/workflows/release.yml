name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # goreleaser 创建 Release 用；npm job 走 NODE_AUTH_TOKEN 连外部 registry，不经 GITHUB_TOKEN

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go test ./... -count=1 -race
      - run: go vet ./...

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

  npm:
    # Publish @agent_forge/forge to npmjs.org. Runs AFTER goreleaser so the
    # GitHub Release binaries already exist — the package's install.js
    # (postinstall) downloads the platform binary from the release at
    # install time, so binaries must be present before the package is usable.
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          # setup-node writes a .npmrc authenticating via NODE_AUTH_TOKEN
          # for this registry — the standard CI pattern, avoids project
          # .npmrc conflicts.
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm (idempotent)
        # 幂等：npm 不允许覆盖已发布版本（同版本重建场景，如 v1.0.0 GitHub Release 二进制
        # 重建 - 二进制可重建，npm 包一旦发布不可撤回）。检测已发布则跳过；npm 包的 install.js
        # 在 install 时按 tag 从 GitHub Release 下载二进制，故重建 Release 后旧 npm 包自动
        # 指向新二进制，无需重发。
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@agent_forge/forge@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already published @agent_forge/forge@$PKG_VERSION, skipping (install.js downloads the rebuilt binary from the v$PKG_VERSION GitHub Release)"
          else
            npm publish
          fi
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
